server {
    listen 80;
    server_name  _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/xml font/woff2;

    # Assets hashés par Angular → cache long et immuable
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpe?g|gif|ico|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ⚠️ Fallback SPA : toute route inconnue renvoie index.html
    #   → c'est ce qui fait fonctionner /overview, /projects, /contact
    #     en accès direct et au rafraîchissement.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html jamais mis en cache (pour servir la dernière version)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
